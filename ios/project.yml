name: lingo
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: QMM486NPYC

targets:
  Lingo-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
      - path: Sources/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.lingo
        INFOPLIST_FILE: Sources/iOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
